<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATS Resume Generator</title>
  <link href="./styles.css" rel="stylesheet">
</head>
<body class="w-96 h-auto bg-gradient-to-br from-blue-50 to-purple-50">
  <div class="p-6">
    <!-- Header -->
    <div class="flex items-center space-x-3 mb-6">
      <div class="w-10 h-10 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold text-gray-800">ATS Resume Generator</h1>
        <p class="text-sm text-gray-600">Optimize your resume for ATS</p>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex bg-white rounded-lg p-1 mb-6 shadow-sm">
      <button id="tab-extract" class="flex-1 py-2 px-3 text-sm font-medium rounded-md bg-blue-600 text-white transition-all">
        Extract JD
      </button>
      <button id="tab-profile" class="flex-1 py-2 px-3 text-sm font-medium rounded-md text-gray-600 hover:text-gray-800 transition-all">
        Profile
      </button>
      <button id="tab-generate" class="flex-1 py-2 px-3 text-sm font-medium rounded-md text-gray-600 hover:text-gray-800 transition-all">
        Generate
      </button>
    </div>

    <!-- Tab Content -->
    <div id="content-extract" class="tab-content">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Job Description</label>
          <div class="relative">
            <textarea 
              id="job-description" 
              rows="6" 
              class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm"
              placeholder="Paste the job description here..."
            ></textarea>
            <button id="extract-from-page" class="absolute top-2 right-2 p-2 text-gray-400 hover:text-blue-600 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
            </button>
          </div>
        </div>
        <button id="analyze-jd" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 px-4 rounded-lg font-medium hover:from-blue-700 hover:to-purple-700 transition-all duration-200 transform hover:scale-105">
          Analyze Job Description
        </button>
        <div id="jd-analysis" class="hidden bg-white rounded-lg p-4 shadow-sm border">
          <h3 class="font-semibold text-gray-800 mb-3">Key Requirements</h3>
          <div id="extracted-keywords" class="flex flex-wrap gap-2"></div>
        </div>
      </div>
    </div>

    <div id="content-profile" class="tab-content hidden">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" id="first-name" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" id="last-name" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input type="tel" id="phone" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Professional Summary</label>
          <textarea id="summary" rows="3" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm" placeholder="Brief professional summary..."></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Skills (comma separated)</label>
          <textarea id="skills" rows="2" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm" placeholder="JavaScript, React, Node.js..."></textarea>
        </div>
      </div>
    </div>

    <div id="content-generate" class="tab-content hidden">
      <div class="space-y-4">
        <div class="bg-white rounded-lg p-4 shadow-sm border">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-gray-800">ATS Score</h3>
            <div id="ats-score" class="text-2xl font-bold text-blue-600">--</div>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div id="ats-progress" class="bg-gradient-to-r from-blue-600 to-purple-600 h-2 rounded-full" style="width: 0%"></div>
          </div>
          <div class="mt-2 text-sm text-gray-600" id="ats-feedback">
            Analyze job description and complete profile to see your ATS score
          </div>
        </div>

        <div id="matched-keywords" class="hidden bg-green-50 rounded-lg p-4 border border-green-200">
          <h4 class="font-medium text-green-800 mb-2">Matched Keywords</h4>
          <div id="matched-list" class="flex flex-wrap gap-1"></div>
        </div>

        <div id="missing-keywords" class="hidden bg-red-50 rounded-lg p-4 border border-red-200">
          <h4 class="font-medium text-red-800 mb-2">Missing Keywords</h4>
          <div id="missing-list" class="flex flex-wrap gap-1"></div>
        </div>

        <button id="generate-resume" class="w-full bg-gradient-to-r from-green-600 to-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:from-green-700 hover:to-blue-700 transition-all duration-200 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
          Generate Resume
        </button>

        <div id="generation-status" class="hidden text-center text-sm text-gray-600">
          <div class="inline-flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Generating your optimized resume...
          </div>
        </div>
      </div>
    </div>

    <!-- Success Message -->
    <div id="success-message" class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg">
      <div class="flex items-center">
        <svg class="w-5 h-5 text-green-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span class="text-sm text-green-800 font-medium">Resume generated successfully!</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
